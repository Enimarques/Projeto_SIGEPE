<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Saída de Veículo</title>
</head>
<body>
    <h1>Registrar Saída de Veículo</h1>
    <form method="post">
        {% csrf_token %}
        <p>Placa: {{ veiculo.placa }}</p>
        <p>Responsável: {{ veiculo.responsavel }}</p>
        <button type="submit">Registrar Saída</button>
    </form>
    <a href="{% url 'home' %}">Voltar para Home</a>
</body>
</html>
